<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta UI - Optimizada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- CORE SETTINGS --- */
        body {
            background-color: #ecf0f3;
            background-image: radial-gradient(at 0% 0%, rgba(255, 255, 255, 0.8) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 0, 0, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* --- THEME ENGINE (CSS Variables) --- */
        :root {
            /* Colores Base */
            --c-amber: linear-gradient(135deg, #fbbf24, #d97706);
            --c-red: linear-gradient(135deg, #f87171, #dc2626);
            --c-green: linear-gradient(135deg, #34d399, #059669);
            --c-purple: linear-gradient(135deg, #a78bfa, #7c3aed);
            --c-blue: linear-gradient(135deg, #22d3ee, #0891b2);

            /* Sombras Base (Rest) */
            --s-amber-r: rgba(245, 158, 11, 0.4);
            --s-red-r: rgba(220, 38, 38, 0.4);
            --s-green-r: rgba(5, 150, 105, 0.4);
            --s-purple-r: rgba(124, 58, 237, 0.4);
            --s-blue-r: rgba(8, 145, 178, 0.4);

            /* Sombras Activas */
            --s-amber-a: rgba(245, 158, 11, 0.8);
            --s-red-a: rgba(220, 38, 38, 0.8);
            --s-green-a: rgba(5, 150, 105, 0.8);
            --s-purple-a: rgba(124, 58, 237, 0.8);
            --s-blue-a: rgba(8, 145, 178, 0.8);
        }

        /* --- CLASES DE UTILIDAD --- */
        .glass-container {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
        }

        .squircle-shape {
            border-radius: 32px;
        }

        .circle-shape {
            border-radius: 50%;
        }

        /* --- COMPONENTE BOTÓN --- */
        .btn-surface {
            position: relative;
            isolation: isolate;
            /* Variables por defecto (se sobrescriben por clases de tema) */
            --bg: var(--c-green);
            --shadow-r: var(--s-green-r);
            --shadow-a: var(--s-green-a);

            background: var(--bg);
            box-shadow: inset 0 2px 2px rgba(255, 255, 255, 0.6), inset 0 -4px 12px rgba(0, 0, 0, 0.05), 0 18px 30px -5px var(--shadow-r);
            transform: translateY(0px) scale(1);
            transition: border-radius 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s ease, background 0.4s ease;
        }

        .btn-surface::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 50%);
            pointer-events: none;
        }

        .btn-surface:active {
            transform: scale(0.97) translateY(8px);
            box-shadow: inset 0 6px 12px rgba(0, 0, 0, 0.15), 0 4px 10px -2px var(--shadow-a);
            filter: brightness(0.96);
            transition: all 0.1s ease-out;
        }

        /* --- MAPA DE TEMAS (Sobrescritura de variables) --- */
        .t-amber {
            --bg: var(--c-amber);
            --shadow-r: var(--s-amber-r);
            --shadow-a: var(--s-amber-a);
        }

        .t-red {
            --bg: var(--c-red);
            --shadow-r: var(--s-red-r);
            --shadow-a: var(--s-red-a);
        }

        .t-green {
            --bg: var(--c-green);
            --shadow-r: var(--s-green-r);
            --shadow-a: var(--s-green-a);
        }

        .t-purple {
            --bg: var(--c-purple);
            --shadow-r: var(--s-purple-r);
            --shadow-a: var(--s-purple-a);
        }

        .t-blue {
            --bg: var(--c-blue);
            --shadow-r: var(--s-blue-r);
            --shadow-a: var(--s-blue-a);
        }

        /* --- ELEMENTOS GRÁFICOS (Iconos) --- */
        .ui-material {
            background: transparent;
            border-color: rgba(0, 0, 0, 0.25);
            box-shadow: inset 1px 1px 2px rgba(0, 0, 0, 0.2), 1px 1px 0 rgba(255, 255, 255, 0.25);
        }

        .ui-solid {
            background: rgba(0, 0, 0, 0.25);
            box-shadow: inset 2px 2px 3px rgba(0, 0, 0, 0.25), 1px 1px 0 rgba(255, 255, 255, 0.25);
        }

        .transition-icon {
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .icon-min-v {
            width: 6px;
            height: 3.5rem;
            border-radius: 99px;
        }

        .icon-min-h {
            width: 3.5rem;
            height: 6px;
            border-radius: 99px;
        }

        .icon-focus {
            width: 3.5rem;
            height: 3.5rem;
            border-width: 6px;
            border-radius: 9999px;
        }

        /* SVG Config */
        .icon-svg-base {
            width: 3.5rem;
            height: 3.5rem;
            stroke: rgba(0, 0, 0, 0.25);
            stroke-width: 54px;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(1px 1px 0px rgba(255, 255, 255, 0.3));
        }

        .morph-path {
            transition: d 0.6s cubic-bezier(0.68, -0.6, 0.32, 1.6);
        }

        /* --- PATH DATA (16 Segments Bézier) --- */

        /* 1. MAX: Cuadrado Redondeado Perfecto (Squircle) */
        /* Construido con 16 segmentos C para coincidir topológicamente con la estrella */
        .state-max .morph-path {
            d: path("M 250,60 C 280,60 310,60 340,60 C 370,60 380,60 400,80 C 420,100 440,120 440,150 C 440,180 440,220 440,250 C 440,280 440,320 440,350 C 440,380 420,400 400,420 C 380,440 370,440 340,440 C 310,440 280,440 250,440 C 220,440 190,440 160,440 C 130,440 120,440 100,420 C 80,400 60,380 60,350 C 60,320 60,280 60,250 C 60,220 60,180 60,150 C 60,120 80,100 100,80 C 120,60 130,60 160,60 C 190,60 220,60 250,60 Z");
        }

        /* 2. NORMAL: Cuadrado Mediano (Misma topología escalada) */
        .state-normal .morph-path {
            d: path("M 250,130 C 290,130 310,130 330,130 C 350,130 360,130 370,140 C 380,150 380,160 380,190 C 380,210 380,250 380,250 C 380,250 380,290 380,310 C 380,340 380,350 370,360 C 360,370 350,370 330,370 C 310,370 290,370 250,370 C 210,370 190,370 170,370 C 150,370 140,370 130,360 C 120,350 120,340 120,310 C 120,290 120,250 120,250 C 120,250 120,210 120,190 C 120,160 120,150 130,140 C 140,130 150,130 170,130 C 190,130 210,130 250,130 Z");
        }

        /* 3. NANO: ESTRELLA COMPLEJA (Azul) - NO ALTERADO */
        .state-nano .morph-path {
            d: path("M 250.00,40.00 C 279.69,40.00 291.59,88.63 313.14,97.56 C 334.69,106.49 377.50,80.51 398.49,101.51 C 419.49,122.50 393.51,165.31 402.44,186.86 C 411.37,208.41 460.00,220.31 460.00,250.00 C 460.00,279.69 411.37,291.59 402.44,313.14 C 393.51,334.69 419.49,377.50 398.49,398.49 C 377.50,419.49 334.69,393.51 313.14,402.44 C 291.59,411.37 279.69,460.00 250.00,460.00 C 220.31,460.00 208.41,411.37 186.86,402.44 C 165.31,393.51 122.50,419.49 101.51,398.49 C 80.51,377.50 106.49,334.69 97.56,313.14 C 88.63,291.59 40.00,279.69 40.00,250.00 C 40.00,220.31 88.63,208.41 97.56,186.86 C 106.49,165.31 80.51,122.50 101.51,101.51 C 122.50,80.51 165.31,106.49 186.86,97.56 C 208.41,88.63 220.31,40.00 250.00,40.00 Z");
        }

        /* 4. OJO (Focus) */
        .state-eye .morph-path {
            d: path("M 50,250 C 50,250 180,100 250,100 C 320,100 450,250 450,250 C 450,250 320,400 250,400 C 180,400 50,250 50,250 Z");
        }

        /* 5. LÍNEA H */
        .state-line-h .morph-path {
            d: path("M 100,250 C 100,250 180,250 250,250 C 320,250 400,250 400,250 C 400,250 320,250 250,250 C 180,250 100,250 100,250 Z");
        }

        /* 6. LÍNEA V */
        .state-line-v .morph-path {
            d: path("M 250,100 C 250,100 250,180 250,250 C 250,320 250,400 250,400 C 250,400 250,320 250,250 C 250,180 250,100 250,100 Z");
        }

        /* --- NUEVAS MEJORAS DE ACCESIBILIDAD Y DISEÑO --- */

        /* Foco visible estético y premium */
        .btn-surface:focus-visible {
            outline: none;
            box-shadow: inset 0 2px 2px rgba(255, 255, 255, 0.6), inset 0 -4px 12px rgba(0, 0, 0, 0.05), 
                        0 18px 30px -5px var(--shadow-r), 0 0 0 4px rgba(255, 255, 255, 0.85), 0 0 0 7px var(--shadow-a);
            transition: box-shadow 0.2s ease;
        }

        /* Pupila del ojo con escala y opacidad reactiva */
        .eye-pupil {
            transform-origin: 250px 250px;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
            opacity: 0;
            transform: scale(0);
        }

        .state-eye .eye-pupil {
            opacity: 1;
            transform: scale(1);
        }

        /* Revelado suave de iconos hover indicators */
        .btn-surface:hover .hover-indicator {
            opacity: 0.7;
            transform: translate(0, 0) scale(1);
        }

        .hover-indicator {
            transform: translate(2px, 2px) scale(0.9);
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Ocultar hover indicator si ya está en modo activo */
        .t-blue .hover-indicator,
        .t-purple .hover-indicator {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* Notch / Indicador permanente */
        .dual-dot {
            position: absolute;
            top: 7px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.18);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
            transition: background-color 0.4s ease, transform 0.4s ease;
        }

        /* Ajustes de color para el Notch */
        .t-blue .dual-dot,
        .t-purple .dual-dot {
            background-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="min-h-screen w-full flex flex-col items-center justify-center gap-16 p-10">

    <!-- Definición Global SVG (Máscara X Reutilizable) -->
    <svg width="0" height="0" class="absolute">
        <defs>
            <mask id="global-x-mask">
                <rect width="100%" height="100%" fill="black" />
                <path d="M16 16L40 40M40 16L16 40" stroke="white" stroke-width="6" stroke-linecap="round" />
            </mask>
        </defs>
    </svg>

    <!-- 2. INSTANCIA HORIZONTAL (Cuadrada) -->
    <div class="glass-container flex flex-col items-center gap-4 p-5 rounded-[44px]">
        <div class="flex flex-row gap-4">
            <!-- Verde: Max / Azul: Nano -->
            <div onclick="handleClick(this, 'max')" 
                 oncontextmenu="handleRightClick(event, this, 'max'); return false;"
                 onkeydown="handleKeyDown(event, this, 'max')"
                 tabindex="0"
                 role="button"
                 aria-label="Maximizar ventana (Clic derecho para Modo Nano)"
                 class="w-24 h-24 t-green squircle-shape btn-surface flex items-center justify-center cursor-pointer select-none">
                <!-- Indicador permanente de doble función (Notch) -->
                <div class="dual-dot"></div>
                
                <svg class="icon-svg-base state-max" viewBox="0 0 500 500">
                    <path class="morph-path" />
                </svg>

                <!-- Mini-icono indicador (Hover Reveal) -->
                <div class="hover-indicator absolute bottom-2 right-2 opacity-0 pointer-events-none text-black/30">
                    <svg class="w-5 h-5 stroke-[2.5px] stroke-current fill-none" viewBox="0 0 24 24">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                </div>
            </div>
            <!-- Rojo: Cerrar -->
            <div onclick="handleCloseClick(this)"
                 onkeydown="handleCloseKeyDown(event, this)"
                 tabindex="0"
                 role="button"
                 aria-label="Cerrar ventana"
                 class="w-24 h-24 t-red squircle-shape btn-surface flex items-center justify-center cursor-pointer"
                 title="Cerrar">
                <svg class="w-14 h-14" viewBox="0 0 56 56"
                    style="filter: drop-shadow(1px 1px 0 rgba(255,255,255,0.3));">
                    <rect width="56" height="56" fill="rgba(0,0,0,0.25)" mask="url(#global-x-mask)" />
                </svg>
            </div>
        </div>
        <!-- Amarillo: Min / Morado: Focus -->
        <div onclick="handleClick(this, 'min')" 
             oncontextmenu="handleRightClick(event, this, 'min'); return false;" 
             onkeydown="handleKeyDown(event, this, 'min')"
             tabindex="0"
             role="button"
             aria-label="Minimizar ventana (Clic derecho para Modo Focus)"
             data-orientation="h"
             class="w-52 h-24 t-amber squircle-shape btn-surface flex items-center justify-center cursor-pointer select-none">
            <!-- Indicador permanente de doble función (Notch) -->
            <div class="dual-dot"></div>
            
            <svg class="icon-svg-base state-line-h" viewBox="0 0 500 500">
                <path class="morph-path" />
                <circle cx="250" cy="250" r="50" fill="rgba(0, 0, 0, 0.25)" class="eye-pupil" />
            </svg>

            <!-- Mini-icono indicador (Hover Reveal) -->
            <div class="hover-indicator absolute bottom-2 right-2.5 opacity-0 pointer-events-none text-black/30">
                <svg class="w-5 h-5 stroke-[2.5px] stroke-current fill-none" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
            </div>
        </div>
    </div>

    <!-- 3. INSTANCIA LINEAL (Rectangular) -->
    <div class="glass-container flex flex-row items-center gap-4 p-5 rounded-[40px]">
        <!-- Amarillo: Min / Morado: Focus -->
        <div onclick="handleClick(this, 'min')" 
             oncontextmenu="handleRightClick(event, this, 'min'); return false;" 
             onkeydown="handleKeyDown(event, this, 'min')"
             tabindex="0"
             role="button"
             aria-label="Minimizar ventana (Clic derecho para Modo Focus)"
             data-orientation="h"
             class="w-52 h-24 t-amber squircle-shape btn-surface flex items-center justify-center cursor-pointer select-none">
            <!-- Indicador permanente de doble función (Notch) -->
            <div class="dual-dot"></div>
            
            <svg class="icon-svg-base state-line-h" viewBox="0 0 500 500">
                <path class="morph-path" />
                <circle cx="250" cy="250" r="50" fill="rgba(0, 0, 0, 0.25)" class="eye-pupil" />
            </svg>

            <!-- Mini-icono indicador (Hover Reveal) -->
            <div class="hover-indicator absolute bottom-2 right-2.5 opacity-0 pointer-events-none text-black/30">
                <svg class="w-5 h-5 stroke-[2.5px] stroke-current fill-none" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
            </div>
        </div>
        <!-- Verde: Max / Azul: Nano -->
        <div onclick="handleClick(this, 'max')" 
             oncontextmenu="handleRightClick(event, this, 'max'); return false;"
             onkeydown="handleKeyDown(event, this, 'max')"
             tabindex="0"
             role="button"
             aria-label="Maximizar ventana (Clic derecho para Modo Nano)"
             class="w-24 h-24 t-green squircle-shape btn-surface flex items-center justify-center cursor-pointer select-none">
            <!-- Indicador permanente de doble función (Notch) -->
            <div class="dual-dot"></div>
            
            <svg class="icon-svg-base state-max" viewBox="0 0 500 500">
                <path class="morph-path" />
            </svg>

            <!-- Mini-icono indicador (Hover Reveal) -->
            <div class="hover-indicator absolute bottom-2 right-2 opacity-0 pointer-events-none text-black/30">
                <svg class="w-5 h-5 stroke-[2.5px] stroke-current fill-none" viewBox="0 0 24 24">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                </svg>
            </div>
        </div>
        <!-- Rojo: Cerrar -->
        <div onclick="handleCloseClick(this)"
             onkeydown="handleCloseKeyDown(event, this)"
             tabindex="0"
             role="button"
             aria-label="Cerrar ventana"
             class="w-24 h-24 t-red squircle-shape btn-surface flex items-center justify-center cursor-pointer"
             title="Cerrar">
            <svg class="w-14 h-14" viewBox="0 0 56 56" style="filter: drop-shadow(1px 1px 0 rgba(255,255,255,0.3));">
                <rect width="56" height="56" fill="rgba(0,0,0,0.25)" mask="url(#global-x-mask)" />
            </svg>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN CENTRALIZADA DE ESTADOS
        const CONFIG = {
            max: {
                initialClass: 't-green',
                nanoClass: 't-blue', // CAJA AZUL = NANO
                svgStates: ['state-max', 'state-normal', 'state-nano'] // [0: Max, 1: Norm, 2: Nano]
            },
            min: {
                initialClass: 't-amber',
                focusClass: 't-purple', // CAJA MORADA = FOCUS
                svgStates: { h: ['state-line-h', 'state-eye'], v: ['state-line-v', 'state-eye'] }
            }
        };

        // ACTUALIZADOR DE ACCESIBILIDAD (ARIA-LABEL DINÁMICO)
        function updateAriaLabel(element, type) {
            if (!element) return;
            const svg = element.querySelector('svg');
            if (!svg) return;
            
            if (type === 'max') {
                const isNano = element.classList.contains(CONFIG.max.nanoClass);
                if (isNano) {
                    element.setAttribute('aria-label', "Modo Nano activo (Clic izquierdo para volver a Maximizar, Clic derecho para normalizar)");
                } else {
                    const isMax = svg.classList.contains(CONFIG.max.svgStates[0]);
                    if (isMax) {
                        element.setAttribute('aria-label', "Maximizar ventana (Clic derecho para Modo Nano)");
                    } else {
                        element.setAttribute('aria-label', "Restaurar ventana (Clic derecho para Modo Nano)");
                    }
                }
            } else if (type === 'min') {
                const isFocus = element.classList.contains(CONFIG.min.focusClass);
                if (isFocus) {
                    element.setAttribute('aria-label', "Modo Focus activo (Clic izquierdo para restaurar, Clic derecho para normalizar)");
                } else {
                    element.setAttribute('aria-label', "Minimizar ventana (Clic derecho para Modo Focus)");
                }
            }
        }

        // GESTOR DE CLICS IZQUIERDOS (Cambio normal de tamaño/estado)
        function handleClick(element, type) {
            const svg = element.querySelector('path').parentElement;
            const conf = CONFIG[type];

            if (type === 'max') {
                const isNano = element.classList.contains(conf.nanoClass);
                if (isNano) {
                    // Si está en modo Nano, clic izquierdo vuelve a Max (Verde y Squircle)
                    element.classList.replace(conf.nanoClass, conf.initialClass);
                    element.classList.replace('circle-shape', 'squircle-shape');
                    svg.setAttribute('class', `icon-svg-base ${conf.svgStates[0]}`);
                } else {
                    // Toggle normal entre Max y Normal (Mediano)
                    const isMax = svg.classList.contains(conf.svgStates[0]);
                    svg.setAttribute('class', `icon-svg-base ${isMax ? conf.svgStates[1] : conf.svgStates[0]}`);
                }
            } else if (type === 'min') {
                const isFocus = element.classList.contains(conf.focusClass);
                if (isFocus) {
                    // Si está en modo Focus, clic izquierdo lo vuelve a amarillo normal
                    element.classList.replace(conf.focusClass, conf.initialClass);
                    const orient = element.dataset.orientation;
                    svg.setAttribute('class', `icon-svg-base ${conf.svgStates[orient][0]}`);
                }
            }
            updateAriaLabel(element, type);
        }

        // GESTOR DE CLICS DERECHOS (Modos especiales Focus y Nano)
        function handleRightClick(event, element, type) {
            if (event) event.preventDefault(); // Evita el menú contextual del navegador
            const svg = element.querySelector('path').parentElement;
            const conf = CONFIG[type];

            if (type === 'max') {
                const isNano = element.classList.contains(conf.nanoClass);
                if (isNano) {
                    // Volver a la normalidad (Verde y Squircle)
                    element.classList.replace(conf.nanoClass, conf.initialClass);
                    element.classList.replace('circle-shape', 'squircle-shape');
                    svg.setAttribute('class', `icon-svg-base ${conf.svgStates[0]}`);
                } else {
                    // Activar modo Nano (Azul y Circular)
                    element.classList.replace(conf.initialClass, conf.nanoClass);
                    element.classList.replace('squircle-shape', 'circle-shape');
                    svg.setAttribute('class', `icon-svg-base ${conf.svgStates[2]}`);
                }
            } 
            else if (type === 'min') {
                const orient = element.dataset.orientation; // 'h' o 'v'
                const states = conf.svgStates[orient];
                const isFocus = element.classList.contains(conf.focusClass);

                if (isFocus) {
                    // Volver a la normalidad (Amarillo y Línea)
                    element.classList.replace(conf.focusClass, conf.initialClass);
                    svg.setAttribute('class', `icon-svg-base ${states[0]}`);
                } else {
                    // Activar modo Focus (Morado y Ojo)
                    element.classList.replace(conf.initialClass, conf.focusClass);
                    svg.setAttribute('class', `icon-svg-base ${states[1]}`);
                }
            }
            updateAriaLabel(element, type);
        }

        // CONTROLADORES DE ACCESIBILIDAD POR TECLADO
        function handleKeyDown(event, element, type) {
            if (event.key === ' ' || event.key === 'Enter') {
                event.preventDefault(); // Detiene scroll por defecto del Space
                if (event.shiftKey) {
                    handleRightClick(event, element, type);
                } else {
                    handleClick(element, type);
                }
            }
        }

        // ACCIÓN BOTÓN CERRAR
        function handleCloseClick(element) {
            element.style.transform = "scale(0.9) translateY(8px)";
            element.style.opacity = "0";
            element.style.transition = "transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s ease";
            setTimeout(() => {
                alert("Acción: Cerrar ventana");
                element.style.transform = "";
                element.style.opacity = "";
            }, 250);
        }

        function handleCloseKeyDown(event, element) {
            if (event.key === ' ' || event.key === 'Enter') {
                event.preventDefault();
                handleCloseClick(element);
            }
        }
    </script>
</body>

</html>
